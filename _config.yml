lang: zh-CN
timezone: Asia/Shanghai

title: Agent Insight
tagline: AI Agent 深度分析
description: AI Agent 领域的深度分析与洞察

url: "https://licsdasheng.github.io"
baseurl: ""

author: ScottLee - 大圣
github:
  username: LicsDaSheng

social:
  name: ScottLee - 大圣
  links:
    - https://github.com/LicsDaSheng

avatar: /assets/images/avatar.png

paginate: 10

read_time: true
comments: false

permalink: /:categories/:title/

theme: jekyll-theme-chirpy

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - rollup.config.js
  - package*.json
  - node_modules
  - vendor

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
