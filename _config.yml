lang: zh-CN
timezone: Asia/Shanghai

title: Agent Insight
tagline: AI Agent 深度分析
description: AI Agent 领域的深度分析与洞察

url: "https://licsdasheng.github.io"
baseurl: ""

author: ScottLee - 大圣
github:
  username: LicsDaSheng

social:
  name: ScottLee - 大圣
  links:
    - https://github.com/LicsDaSheng

# 头像：放置图片到 assets/images/avatar.png 后取消下一行注释即可
# avatar: /assets/images/avatar.png
avatar: ""

paginate: 10

read_time: true

permalink: /:categories/:title/

theme: jekyll-theme-chirpy

# Chirpy 侧边栏导航来自 tabs 集合，gem 模式需显式声明
collections:
  tabs:
    output: true
    sort_by: order

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true

exclude:
  - "*.gem"
  - "*.gemspec"
  - README.md
  - LICENSE
  - vendor
  - .github
  - CLAUDE.md
  - .impeccable

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
