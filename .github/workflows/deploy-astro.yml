name: Deploy Astro site to Pages

on:
  # 推送到 main 时自动构建发布（合并本分支到 main 后生效）
  push:
    branches: [main]
  # 允许在 Actions 页手动触发
  workflow_dispatch:

# GitHub Pages 部署所需权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个发布，但不取消进行中的部署
concurrency:
  group: pages
  cancel-in-progress: false

# 所有 run 步骤默认在 astro-site 子目录执行
defaults:
  run:
    working-directory: astro-site

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
          # package.json 在子目录，需显式指定以读取 packageManager 字段
          package_json_file: astro-site/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: astro-site/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Astro (含 Pagefind 搜索索引)
        run: pnpm build
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 相对仓库根目录
          path: astro-site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
